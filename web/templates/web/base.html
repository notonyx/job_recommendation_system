{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Job Recommender — подбор вакансий по резюме</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<header class="navbar">
    <h1>Job Recommender</h1>
    <nav>
        <a href="/">Главная</a>
        <a href="/upload/">Загрузить резюме</a>
    </nav>
</header>

<main class="container">
    {% block content %}
    {% endblock %}
</main>

<footer class="footer">
    <p>Система рекомендации вакансий на основе анализа резюме</p>
</footer>

{% block extra_js %}{% endblock %}

<div id="loader" class="loader hidden">
    <div class="loader-box">
        <div class="spinner"></div>
        <p>Подбираем вакансии...</p>
    </div>
</div>
</body>
</html>
